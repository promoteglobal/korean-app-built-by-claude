<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>수지 선생님 · Korean Practice</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0b0617;
            --bg-card:      #140d28;
            --bg-input:     #1a1133;
            --bubble-ai:    #1c1240;
            --bubble-user:  #3b1a72;
            --accent:       #8b5cf6;
            --accent-light: #c4b5fd;
            --accent-dim:   #4c1d95;
            --text:         #f3eeff;
            --text-2:       #a78bfa;
            --text-3:       #6b4fa0;
            --border:       #2a1d55;
            --red:          #ef4444;
            --green:        #4ade80;
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── Modal ── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 50; padding: 24px;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%; max-width: 400px;
            box-shadow: 0 24px 60px rgba(139,92,246,.25);
        }
        .modal h2 { color: var(--accent-light); font-size: 1.35rem; margin-bottom: 10px; }
        .modal p  { color: var(--text-2); font-size: .88rem; line-height: 1.55; margin-bottom: 20px; }
        .modal input {
            width: 100%; padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text); font-size: .93rem;
            margin-bottom: 10px; outline: none;
            transition: border-color .18s;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal .err { color: var(--red); font-size: .8rem; margin-bottom: 12px; display: none; }
        .btn-primary {
            width: 100%; padding: 13px;
            background: var(--accent); border: none; border-radius: 10px;
            color: white; font-size: .97rem; font-weight: 600;
            cursor: pointer; transition: opacity .15s;
        }
        .btn-primary:hover { opacity: .85; }

        /* ── Header ── */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .h-left { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .tname { font-weight: 700; font-size: .97rem; }
        .tsub  { font-size: .72rem; color: var(--text-3); margin-top: 1px; }
        .h-right { display: flex; align-items: center; gap: 6px; }

        .pill {
            padding: 5px 11px; border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-2); font-size: .78rem;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .pill:hover, .pill.on {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-light);
        }
        .icon-sm {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-3);
            font-size: .9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: color .18s;
        }
        .icon-sm:hover { color: var(--accent-light); }

        /* ── App shell — must be flex column so #chat can scroll ── */
        #app {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* ── Chat ── */
        #chat {
            flex: 1; overflow-y: auto;
            padding: 14px 12px;
            display: flex; flex-direction: column; gap: 14px;
            min-height: 0; /* lets flex child overflow-scroll instead of expanding */
        }
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Messages ── */
        .msg { display: flex; gap: 8px; align-items: flex-end; animation: rise .25s ease; }
        @keyframes rise { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }
        .msg.user { flex-direction: row-reverse; }

        .msg-icon {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem; flex-shrink: 0;
        }
        .msg.ai .msg-icon   { background: linear-gradient(135deg,#4c1d95,#7c3aed); }
        .msg.user .msg-icon { background: var(--bg-card); border: 1px solid var(--border); }

        .msg-col { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
        .msg.user .msg-col { align-items: flex-end; }

        .bubble {
            padding: 10px 14px; border-radius: 16px;
            line-height: 1.65; font-size: .93rem;
        }
        .msg.ai .bubble {
            background: var(--bubble-ai);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg.user .bubble {
            background: var(--bubble-user);
            border-bottom-right-radius: 4px;
        }

        /* Bubble text styles */
        .bubble .en         { color: var(--text-2); font-size: .87rem; }
        .bubble .fix-label  { color: #f87171; font-weight: 700; font-size: .83rem; margin-top: 6px; display: block; }
        .bubble .fix-good   { color: #86efac; font-style: italic; }

        /* Play button */
        .play-btn {
            padding: 3px 9px; border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-3);
            font-size: .75rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
            transition: all .18s; align-self: flex-start;
        }
        .play-btn:hover, .play-btn.on {
            color: var(--accent-light); border-color: var(--accent);
            background: rgba(139,92,246,.12);
        }

        /* Typing dots */
        .dots { display: flex; gap: 4px; padding: 12px 14px; }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); opacity: .5;
            animation: bob 1.2s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay:.15s; }
        .dot:nth-child(3) { animation-delay:.3s; }
        @keyframes bob { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-5px);opacity:1} }

        /* ── Status ── */
        #status {
            text-align: center; font-size: .73rem; color: var(--text-3);
            padding: 2px 0; min-height: 18px; flex-shrink: 0;
        }
        #status.red    { color: var(--red); }
        #status.purple { color: var(--accent-light); }

        /* ── Input row ── */
        #input-row {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex; gap: 7px; align-items: flex-end;
            flex-shrink: 0;
        }
        .ctrl {
            width: 42px; height: 42px; border-radius: 11px;
            border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-2);
            font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .18s; flex-shrink: 0;
        }
        .ctrl:hover { border-color: var(--accent); color: var(--accent-light); }

        #mic-btn.on {
            background: rgba(239,68,68,.15);
            border-color: var(--red); color: var(--red);
            animation: glow 1.4s ease-in-out infinite;
        }
        @keyframes glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 6px rgba(239,68,68,.18)} }

        #send-btn { background: var(--accent); border-color: var(--accent); color: white; }
        #send-btn:hover { opacity: .85; }

        #msg-input {
            flex: 1; min-height: 42px; max-height: 110px;
            background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 11px;
            padding: 10px 12px; color: var(--text);
            font-size: .93rem; font-family: inherit;
            resize: none; outline: none; line-height: 1.45;
            transition: border-color .18s;
        }
        #msg-input:focus { border-color: var(--accent); }
        #msg-input::placeholder { color: var(--text-3); }

        .hidden { display: none !important; }

        @media (max-width: 380px) {
            .bubble { font-size: .87rem; }
            .msg-col { max-width: 88%; }
        }
    </style>
</head>
<body>

<!-- ── API Key Modal ── -->
<div class="overlay" id="modal">
    <div class="modal">
        <h2>🌸 수지 선생님</h2>
        <p>
            Enter your <strong>Anthropic API key</strong> to start your Korean lesson.
            It's saved only in your browser's local storage — never sent anywhere except directly to Anthropic.
        </p>
        <input type="password" id="key-input" placeholder="sk-ant-api03-..." autocomplete="off">
        <div class="err" id="key-err">Key must start with <code>sk-ant-</code></div>
        <button class="btn-primary" onclick="initApp()">수업 시작! · Let's start!</button>
    </div>
</div>

<!-- ── App ── -->
<div id="app" class="hidden">
    <header>
        <div class="h-left">
            <div class="avatar">🌸</div>
            <div>
                <div class="tname">수지 선생님</div>
                <div class="tsub">TOPIK Level 2 · Korean Conversation</div>
            </div>
        </div>
        <div class="h-right">
            <button class="icon-sm" onclick="newChat()"   title="New conversation">↺</button>
            <button class="icon-sm" onclick="changeKey()" title="Change API key">⚙</button>
        </div>
    </header>

    <div id="chat"></div>
    <div id="status"></div>

    <div id="input-row">
        <button class="ctrl" id="lang-btn" onclick="toggleMicLang()" title="Switch mic language">한</button>
        <button class="ctrl" id="mic-btn"  onclick="toggleMic()"  title="Tap to start, tap again to send">🎤</button>
        <button class="ctrl" id="send-btn" onclick="send()" title="Send">➤</button>
        <textarea id="msg-input" placeholder="한국어로 대답하세요… (English OK too)" rows="1"
            onkeydown="onKey(event)" oninput="grow(this)"></textarea>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════

const MODEL   = 'claude-sonnet-4-6';
const API_URL = 'https://api.anthropic.com/v1/messages';

const SYSTEM = `You are Suji (수지), a warm, patient, and encouraging Korean language teacher. Your student is an intermediate learner at TOPIK Level 2.

STRICT RULES:
1. Ask EXACTLY ONE simple conversational question per turn. Keep it at TOPIK Level 2 difficulty.
2. FORMAT: Write Korean first, then the English translation in (parentheses) on the very next line.
3. CRITICAL TRANSLATION RULE — follow this precisely:
   • Korean present tense endings (아/어요, 습니다, 아/어, 이에요/예요) WITHOUT 고 있어요 → English SIMPLE PRESENT.
     - 먹어요 → "eats"  ✓   NOT "is eating"  ✗
     - 가요 → "goes"  ✓   NOT "is going"  ✗
     - 좋아해요 → "likes"  ✓   NOT "is liking"  ✗
   • Korean 고 있어요 / 고 있습니다 → English PRESENT PROGRESSIVE ("-ing").
     - 먹고 있어요 → "is eating"  ✓
4. If the student makes a grammar mistake, correct it gently. Use this exact format:
   ✏️ 수정 (Correction): "[their text]" → "[corrected text]"
   Then add one short English sentence explaining why.
5. The student may mix English words into their Korean sentences when they don't know a word (e.g., "나는 school에 가요"). This is encouraged! When they do:
   - Fill in the Korean word naturally in your response: "맞아요! 학교 (school) — 나는 학교에 가요."
   - Praise them for trying and keep the conversation going.
6. React warmly to their answer before asking the next question.
7. Use encouraging phrases: 잘했어요! 맞아요! 훌륭해요! 좋아요!
8. Never repeat the same question you just asked.

RESPONSE FORMAT EXAMPLE:
잘했어요! 저도 주말에 공부해요. 😊
(Great! I also study on weekends.)
지금 어디에 살아요?
(Where do you live now?)`;

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let apiKey     = localStorage.getItem('suji_ak') || '';
let history    = [];
let micLang    = 'ko-KR';
let listening  = false;
let recog      = null;
let koVoice    = null;
let finalText  = '';   // accumulates final STT chunks
let sendTimer  = null; // auto-send after silence

// ═══════════════════════════════════════════════════════
// BOOT / API KEY
// ═══════════════════════════════════════════════════════

function boot() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadVoices();
    greet();
}

function initApp() {
    const k = document.getElementById('key-input').value.trim();
    if (!k.startsWith('sk-ant-')) {
        document.getElementById('key-err').style.display = 'block';
        return;
    }
    apiKey = k;
    localStorage.setItem('suji_ak', k);
    boot();
}

document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') initApp();
});

function changeKey() {
    if (confirm('Clear API key and reload?')) {
        localStorage.removeItem('suji_ak');
        location.reload();
    }
}

function newChat() {
    if (history.length && !confirm('Start a new conversation?')) return;
    history = [];
    document.getElementById('chat').innerHTML = '';
    greet();
}

if (apiKey) boot();

// ═══════════════════════════════════════════════════════
// TEXT-TO-SPEECH
// ═══════════════════════════════════════════════════════

function loadVoices() {
    function pick() {
        const vs = speechSynthesis.getVoices();
        if (!vs.length) return;
        // Ranked preference list — add more as needed
        const prefer = [
            'Google 한국의', 'Google Korean',
            'Microsoft Heami Online (Natural)', 'Microsoft Heami',
            'Yuna', 'Nari', 'Sora',
        ];
        for (const name of prefer) {
            const v = vs.find(v => v.name.includes(name));
            if (v) { koVoice = v; return; }
        }
        // Fallback: any Korean voice
        koVoice = vs.find(v => v.lang.startsWith('ko')) || null;
    }
    pick();
    speechSynthesis.onvoiceschanged = pick;
}

function speakKo(rawText) {
    speechSynthesis.cancel();

    // Strip English parentheticals and correction labels before speaking
    let t = rawText
        .replace(/✏️[^\n]*/g, '')
        .replace(/\(([^)]*)\)/g, (_, inner) =>
            /[a-zA-Z]{3,}/.test(inner) ? '' : `(${inner})`)
        .replace(/[^가-힣㄰-㆏ᄀ-ᇿ\s!?,.:~·…—]/g, ' ')
        .replace(/\s{2,}/g, ' ')
        .trim();

    if (!t) return null;

    const utt = new SpeechSynthesisUtterance(t);
    utt.lang  = 'ko-KR';
    utt.rate  = 0.88;
    utt.pitch = 1.05;
    if (koVoice) utt.voice = koVoice;
    speechSynthesis.speak(utt);
    return utt;
}

// Speak Korean TTS, then auto-start mic once it finishes
// (stops mic first so TTS audio can't feed back into recognition)
function autoPlayAndListen(text) {
    if (listening) stopMic();
    const utt = speakKo(text);
    const onDone = () => {
        const inp = document.getElementById('msg-input');
        if (!listening && !inp.value.trim() && recog) {
            setTimeout(startMic, 600);
        }
    };
    if (utt) {
        utt.onend  = onDone;
        utt.onerror = onDone;
    } else {
        onDone();
    }
}

// ═══════════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════

;(function setupRecog() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        document.getElementById('mic-btn').classList.add('hidden');
        document.getElementById('lang-btn').classList.add('hidden');
        return;
    }
    recog = new SR();
    recog.continuous     = true;  // keep listening through thinking pauses
    recog.interimResults = true;  // show words appearing in real-time

    recog.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                finalText += e.results[i][0].transcript;
            } else {
                interim += e.results[i][0].transcript;
            }
        }
        // Show live text in the box — no auto-send, user taps mic again to submit
        const inp = document.getElementById('msg-input');
        inp.value = finalText + interim;
        grow(inp);
    };

    recog.onerror = e => {
        clearTimeout(sendTimer);
        stopMic();
        const msgs = { 'no-speech': 'No speech — try again.', 'not-allowed': 'Microphone access denied.' };
        setStatus(msgs[e.error] || 'Mic error: ' + e.error, 'red');
        setTimeout(() => setStatus(''), 3000);
    };

    // Chrome stops recognition after ~60s; restart automatically if still listening
    recog.onend = () => {
        if (listening) { try { recog.start(); } catch {} }
    };
})();

function toggleMic() { listening ? stopMicAndSend() : startMic(); }

function startMic() {
    if (!recog) return;
    // Always start fresh — clear any leftover text from previous session
    finalText = '';
    clearTimeout(sendTimer);
    const inp = document.getElementById('msg-input');
    inp.value = '';
    inp.style.height = 'auto';
    recog.lang = micLang;
    try { recog.start(); } catch { return; }
    listening = true;
    document.getElementById('mic-btn').classList.add('on');
    setStatus(`🎤 Your turn — tap 🎤 again when done`, 'purple');
}

function stopMic() {
    clearTimeout(sendTimer);
    listening = false;
    if (recog) recog.abort();
    document.getElementById('mic-btn').classList.remove('on');
    setStatus('');
}

function stopMicAndSend() {
    clearTimeout(sendTimer);
    listening = false;
    if (recog) recog.abort();
    document.getElementById('mic-btn').classList.remove('on');
    setStatus('');
    const inp = document.getElementById('msg-input');
    if (inp.value.trim()) setTimeout(send, 100);
}

function toggleMicLang() {
    micLang = micLang === 'ko-KR' ? 'en-US' : 'ko-KR';
    const isKo = micLang === 'ko-KR';
    const btn  = document.getElementById('lang-btn');
    btn.textContent = isKo ? '한' : 'EN';
    btn.classList.toggle('on', !isKo);
    setStatus(`Mic switched to ${isKo ? 'Korean' : 'English'}`, 'purple');
    setTimeout(() => setStatus(''), 2000);
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════

function setStatus(msg, cls = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = cls;
}

function grow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function scrollBottom() {
    const c = document.getElementById('chat');
    requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

function fmtBubble(text) {
    return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        // Correction label
        .replace(/(✏️ 수정 \(Correction\):)/g, '<span class="fix-label">$1</span>')
        // Arrow + corrected text in green
        .replace(/→ "([^"]+)"/g, '→ <span class="fix-good">"$1"</span>')
        // Parenthetical English translations in muted colour
        .replace(/\(([^)]+)\)/g, (_, inner) =>
            /[a-zA-Z]/.test(inner)
                ? `<span class="en">(${inner})</span>`
                : `(${inner})`)
        .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════════════
// CHAT MESSAGES
// ═══════════════════════════════════════════════════════

function addMsg(role, text, autoPlay = false) {
    const chat = document.getElementById('chat');

    const row  = Object.assign(document.createElement('div'), { className: `msg ${role}` });
    const icon = Object.assign(document.createElement('div'), { className: 'msg-icon', textContent: role === 'ai' ? '🌸' : '🙋' });
    const col  = Object.assign(document.createElement('div'), { className: 'msg-col' });
    const bub  = Object.assign(document.createElement('div'), { className: 'bubble' });

    if (role === 'ai') {
        bub.innerHTML = fmtBubble(text);

        const pb = Object.assign(document.createElement('button'), {
            className: 'play-btn',
            innerHTML: '▶ 듣기',
        });
        pb.onclick = () => {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                document.querySelectorAll('.play-btn').forEach(b => {
                    b.classList.remove('on'); b.innerHTML = '▶ 듣기';
                });
                return;
            }
            document.querySelectorAll('.play-btn').forEach(b => {
                b.classList.remove('on'); b.innerHTML = '▶ 듣기';
            });
            pb.classList.add('on'); pb.innerHTML = '■ 정지';
            const u = speakKo(text);
            if (u) {
                u.onend  = () => { pb.classList.remove('on'); pb.innerHTML = '▶ 듣기'; };
                u.onerror = () => { pb.classList.remove('on'); pb.innerHTML = '▶ 듣기'; };
            }
        };

        col.appendChild(bub);
        col.appendChild(pb);
    } else {
        bub.textContent = text;
        col.appendChild(bub);
    }

    row.appendChild(icon);
    row.appendChild(col);
    chat.appendChild(row);
    scrollBottom();

    if (autoPlay) setTimeout(() => autoPlayAndListen(text), 280);
}

function addTyping() {
    const chat = document.getElementById('chat');
    const row  = document.createElement('div');
    row.className = 'msg ai'; row.id = 'typing';
    row.innerHTML = `<div class="msg-icon">🌸</div>
        <div class="msg-col">
            <div class="bubble">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>`;
    chat.appendChild(row);
    scrollBottom();
}

function removeTyping() { document.getElementById('typing')?.remove(); }

// ═══════════════════════════════════════════════════════
// ANTHROPIC API
// ═══════════════════════════════════════════════════════

async function callAPI(msgs) {
    const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
            model: MODEL,
            max_tokens: 1024,
            system: SYSTEM,
            messages: msgs,
        }),
    });

    if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || `HTTP ${res.status}`);
    }
    return (await res.json()).content[0].text;
}

// ═══════════════════════════════════════════════════════
// CONVERSATION
// ═══════════════════════════════════════════════════════

async function greet() {
    addTyping();
    const seed = [{ role: 'user', content: 'Please greet me warmly and ask your first question.' }];
    try {
        const reply = await callAPI(seed);
        // Seed message becomes part of history so context is coherent
        history = [...seed, { role: 'assistant', content: reply }];
        removeTyping();
        addMsg('ai', reply, true);
    } catch(e) {
        removeTyping();
        setStatus('Connection failed — ' + e.message, 'red');
    }
}

async function send() {
    const inp  = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text) return;

    inp.value = '';
    grow(inp);
    addMsg('user', text);

    history.push({ role: 'user', content: text });
    addTyping();

    try {
        const reply = await callAPI(history);
        history.push({ role: 'assistant', content: reply });
        removeTyping();
        addMsg('ai', reply, true);
    } catch(e) {
        removeTyping();
        history.pop();
        setStatus('Error — ' + e.message, 'red');
        setTimeout(() => setStatus(''), 4000);
    }
}
